<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>go-kms admin</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2e;
      --text: #e7ecff;
      --muted: #a7b2d9;
      --accent: #4f7cff;
      --good: #29d391;
      --warn: #f8b84e;
    }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #142042 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(920px, 100%);
      background: color-mix(in srgb, var(--panel) 92%, black);
      border: 1px solid #243154;
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
      overflow: hidden;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid #243154;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: .3px;
    }
    .badge {
      background: rgba(79,124,255,.2);
      border: 1px solid rgba(79,124,255,.35);
      color: #9cb6ff;
      border-radius: 999px;
      font-size: 12px;
      padding: 4px 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      padding: 16px;
    }
    section {
      border: 1px solid #243154;
      border-radius: 12px;
      background: rgba(10, 16, 36, .55);
      padding: 14px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--muted);
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }
    li {
      border: 1px solid #223056;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      background: rgba(17, 26, 49, .55);
    }
    .state {
      font-size: 12px;
      border-radius: 999px;
      padding: 3px 8px;
      border: 1px solid #2c3a5d;
      color: var(--muted);
    }
    .state.Enabled { color: var(--good); border-color: rgba(41,211,145,.4); }
    .state.PendingDeletion { color: var(--warn); border-color: rgba(248,184,78,.4); }
    .state.Disabled { color: #ff7b87; border-color: rgba(255,123,135,.4); }
    .empty { color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>go-kms admin</h1>
      <span class="badge">mvp</span>
    </header>
    <div class="grid">
      <section>
        <h2>Keys</h2>
        {{if .Keys}}
        <ul>
          {{range .Keys}}
          <li>
            <span>{{.ID}}</span>
            <span class="state {{.State}}">{{.State}}</span>
          </li>
          {{end}}
        </ul>
        {{else}}
        <p class="empty">No keys found.</p>
        {{end}}
      </section>
      <section>
        <h2>Aliases</h2>
        {{if .Aliases}}
        <ul>
          {{range .Aliases}}
          <li>
            <span>{{.Name}}</span>
            <span>{{.TargetKey}}</span>
          </li>
          {{end}}
        </ul>
        {{else}}
        <p class="empty">No aliases found.</p>
        {{end}}
      </section>
    </div>
  </main>
</body>
</html>
