<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>go-kms | Admin Login</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel: #ffffff;
      --text: #18212f;
      --muted: #667085;
      --line: #d4dbe7;
      --brand: #0073bb;
      --brand-2: #005d99;
      --warn: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(0, 115, 187, 0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 153, 0, 0.12), transparent 26%),
        linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Public Sans", "Segoe UI", sans-serif;
    }
    .card {
      width: min(440px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(17, 24, 39, 0.08);
      overflow: hidden;
    }
    .head {
      padding: 24px 24px 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      color: var(--brand);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 10px 0 4px;
      font-size: 30px;
      letter-spacing: -0.04em;
    }
    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    form {
      padding: 22px 24px 24px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
    }
    input {
      width: 100%;
      border: 1px solid #c7d1df;
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      color: inherit;
      background: #fff;
      margin-bottom: 14px;
    }
    .btn {
      width: 100%;
      border: 1px solid var(--brand-2);
      background: var(--brand);
      color: #fff;
      border-radius: 999px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .err {
      margin: 16px 24px 0;
      border: 1px solid #f2b8b5;
      background: #fff5f5;
      color: var(--warn);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="head">
      <div class="eyebrow">go-kms control plane</div>
      <h1>Admin sign in</h1>
      <div class="sub">Authenticate to access the KMS, Secrets Manager, and Audit Explorer workflows.</div>
    </div>
    {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
    <form method="post" action="/admin/login?next={{.NextPath}}">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" type="password" name="password" autocomplete="current-password" required>

      <button class="btn" type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
