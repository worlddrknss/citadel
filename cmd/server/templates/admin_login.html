<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Citadel — Sign in</title>
  <style>
    :root{--c-bg:#f0f2f5;--c-surface:#fff;--c-border:#dde1e9;--c-text:#111827;--c-muted:#6b7280;--c-blue:#0070c4;--c-blue-h:#0059a0;--c-red:#dc2626;--c-red-lo:#fee2e2;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--r:10px;--r-sm:6px;--r-lg:16px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);font-size:14px;color:var(--c-text);background:linear-gradient(135deg,#e8f2fb 0%,var(--c-bg) 40%,#fff 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:min(420px,100%);background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);box-shadow:0 20px 60px rgba(17,24,39,.10);overflow:hidden}
    .card-top{padding:28px 28px 20px;border-bottom:1px solid var(--c-border);background:linear-gradient(180deg,#fff 0%,#f7f9fc 100%)}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px}
    .brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--c-blue),#38bdf8);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
    .brand-name{font-size:15px;font-weight:700;line-height:1.1}
    .brand-sub{font-size:11px;color:var(--c-muted);margin-top:2px}
    h1{font-size:24px;font-weight:700;letter-spacing:-.03em;line-height:1.2}
    .tagline{margin-top:6px;font-size:13px;color:var(--c-muted);line-height:1.5}
    .card-body{padding:24px 28px 28px}
    .f-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .f-row label{font-size:12px;font-weight:700}
    input{font:inherit;font-size:14px;color:var(--c-text);background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-sm);padding:10px 12px;width:100%;transition:border-color .15s,box-shadow .15s}
    input:focus{outline:none;border-color:var(--c-blue);box-shadow:0 0 0 3px rgba(0,112,196,.12)}
    .btn-submit{display:flex;align-items:center;justify-content:center;width:100%;padding:11px 16px;background:var(--c-blue);color:#fff;font:inherit;font-size:14px;font-weight:700;border:1px solid var(--c-blue-h);border-radius:var(--r-sm);cursor:pointer;transition:background .12s;margin-top:4px}
    .btn-submit:hover{background:var(--c-blue-h)}
    .err-banner{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--c-red-lo);border:1px solid #fca5a5;border-radius:var(--r-sm);color:var(--c-red);font-size:13px;margin-bottom:14px}
    .helper{margin-top:16px;font-size:12px;color:var(--c-muted);line-height:1.6;background:#f7f9fc;border:1px solid var(--c-border);border-radius:var(--r-sm);padding:10px 12px}
    .helper code{font-size:11px;background:#e8edf2;padding:1px 4px;border-radius:3px}
  </style>
</head>
<body>
  <div class="card">
    <div class="card-top">
      <div class="brand">
        <div class="brand-icon">C</div>
        <div><div class="brand-name">Citadel</div><div class="brand-sub">Control Plane</div></div>
      </div>
      <h1>Sign in</h1>
      <p class="tagline">Access the KMS, Secrets Manager, and Audit Explorer admin console.</p>
    </div>
    <div class="card-body">
      {{if .Error}}<div class="err-banner">⚠ {{.Error}}</div>{{end}}
      <form method="post" action="/admin/login?next={{.NextPath}}">
        <div class="f-row">
          <label for="username">Username</label>
          <input id="username" type="text" name="username" autocomplete="username" autofocus required>
        </div>
        <div class="f-row">
          <label for="password">Password</label>
          <input id="password" type="password" name="password" autocomplete="current-password" required>
        </div>
        <button class="btn-submit" type="submit">Sign in →</button>
      </form>
      <div class="helper">
        Set <code>KMS_UI_PASSWORD</code> to enable authentication, or use <code>KMS_UI_USERS_JSON</code> for multiple users with roles and tenant scoping.
      </div>
    </div>
  </div>
</body>
</html>
